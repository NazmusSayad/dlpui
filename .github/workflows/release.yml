name: Build and Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            target: x86_64-pc-windows-msvc
            runs-on: windows-latest
          - platform: linux
            target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
          - platform: linux
            target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-24.04-arm
          - platform: macos
            target: aarch64-apple-darwin
            runs-on: macos-latest

    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libclang-dev \
            libomp-dev \
            libxdo-dev \
            xdg-utils \
            protobuf-compiler

      - name: Configure macOS environment (macOS only)
        if: matrix.platform == 'macos'
        run: |
          brew install libomp

          echo "WHISPER_OPENMP=1" >> $GITHUB_ENV
          echo "WHISPER_COREML=0" >> $GITHUB_ENV

          echo "CFLAGS=-march=armv8.2-a -mmacosx-version-min=14.0" >> $GITHUB_ENV
          echo "CXXFLAGS=-march=armv8.2-a -mmacosx-version-min=14.0" >> $GITHUB_ENV

          export MACOSX_DEPLOYMENT_TARGET=14.0
          echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> $GITHUB_ENV
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=14.0" >> $GITHUB_ENV

          echo "CPPFLAGS=-I$(brew --prefix libomp)/include" >> $GITHUB_ENV
          echo "LDFLAGS=-L$(brew --prefix libomp)/lib" >> $GITHUB_ENV

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OiPer ${{ github.ref_name }}"
          releaseBody: |
            ## Installation

            - **Windows x64**: Download the `.msi` or `.exe` installer
            - **macOS Apple Silicon**: Download the `.dmg` file ending with `_aarch64`
            - **Linux x64**: Download the `.deb`, `.AppImage`, or `.rpm` package
            - **Linux ARM64**: Download the `.deb`, `.AppImage`, or `.rpm` package ending with `_aarch64`
          releaseDraft: false
          prerelease: false
